<!DOCTYPE html>
<html>
<head>
    <title>Colors Background Fonts TextStyles</title>
    <style>
        body {
            background-color: lightgray;
            font-family: Arial;
        }

        h1 {
            color: blue;
            text-align: center;
        }

        p {
            color: darkgreen;
            font-size: 18px;
        }

        .box {
            background-color: yellow;
            padding: 10px;
            border: 2px solid black;
        }

        .text-style {
            font-style: italic;
            font-weight: bold;
            text-decoration: underline;
            color: red;
        }
    </style>
</head>
<body>

    <h1>CSS Example</h1>

    <div class="box">
        <p>This is background color example.</p>
    </div>

    <p class="text-style">This text shows font and text styles.</p>

</body>
</html>
